name: Deploy

# Deploy a git-tagged release: push a tag like v1.2.3 to build the image, push it
# to ghcr.io, and run `kamal deploy` against the Hetzner VPS.
#
# Required GitHub Actions secrets:
#   CR_PAT                 GitHub PAT with read:packages + write:packages (ghcr auth)
#   SSH_PRIVATE_KEY        private key whose public key is on the VPS (root authorized_keys)
#   SECRET_KEY_BASE        `mix phx.gen.secret`
#   DATABASE_URL           postgres://masaryk:<POSTGRES_PASSWORD>@masaryk_ex-db:5432/masaryk_ex_prod
#   POSTGRES_PASSWORD      Postgres password (must match the one inside DATABASE_URL)
#   BOT_TOKEN              Discord bot token
#   DISCORD_CLIENT_SECRET  Discord OAuth client secret
#
# Prerequisite: run `kamal setup` once from your laptop to bootstrap the server.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.CR_PAT }}
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal -v 2.12.0

      - uses: docker/setup-buildx-action@v3

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust the VPS host key
        run: |
          mkdir -p ~/.ssh
          printf "Host *\n  StrictHostKeyChecking accept-new\n" > ~/.ssh/config

      - name: Deploy ${{ github.ref_name }}
        run: kamal deploy --version "${{ github.ref_name }}"
