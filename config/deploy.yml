# Kamal 2 deploy config. Fill in the <PLACEHOLDERS> before deploying:
#   <github-user>        your GitHub username/org (lowercase) for the ghcr image
#   <VPS_IP>             the Hetzner server's public IPv4
#   masaryk.example.com  your real domain (must match PHX_HOST below)
#   <guild_id> / <client_id> / <role_id>  your Discord IDs
#
# Secret VALUES come from the environment via .kamal/secrets (never committed here).
service: masaryk_ex
# `registry.server` (ghcr.io) is prepended automatically — don't repeat it here.
image: ellafyi/masaryk_ex

# Name of the container image.
image: my-user/my-app

# Deploy to these servers.
servers:
    web:
        hosts:
            - 159.69.245.249
        # Run migrations on boot, then start the release (single instance → safe).
        cmd: sh -c 'bin/masaryk_ex eval "MasarykEx.Release.migrate()" && bin/masaryk_ex start'

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
    ssl: true
    host: masaryk.ella.gy
    app_port: 4000
    healthcheck:
        path: /up

# Credentials for your image host.
registry:
    server: ghcr.io
    username: ellafyi
    password:
        - KAMAL_REGISTRY_PASSWORD

    # Always use an access token rather than real password (pulled from .kamal/secrets).
    # password:
    #   - KAMAL_REGISTRY_PASSWORD

# Configure builder setup.
builder:
    arch: amd64
    # Pass in additional build args needed for your Dockerfile.
    # args:
    #   RUBY_VERSION: <%= ENV["RBENV_VERSION"] || ENV["rvm_ruby_string"] || "#{RUBY_ENGINE}-#{RUBY_ENGINE_VERSION}" %>

env:
    clear:
        PORT: 4000
        POOL_SIZE: 15
        PHX_HOST: masaryk.ella.gy
        DISCORD_REDIRECT_URI: https://masaryk.ella.gy/auth/discord/callback
        DISCORD_GUILD_ID: "486184376544002073"
        DISCORD_CLIENT_ID: "1510204580053651467"
        STATS_ROLE_ID: "504237720965480450"
    secret:
        - SECRET_KEY_BASE
        - DATABASE_URL
        - BOT_TOKEN
        - DISCORD_CLIENT_SECRET

accessories:
    db:
        image: postgres:16-alpine
        host: 159.69.245.249
        # No published port: the app reaches Postgres over Kamal's private network at
        # the accessory's container name `masaryk_ex-db` (see DATABASE_URL).
        env:
            clear:
                POSTGRES_USER: masaryk
                POSTGRES_DB: masaryk_ex_prod
            secret:
                - POSTGRES_PASSWORD
        directories:
            - data:/var/lib/postgresql/data
