services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: masaryk_dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    app:
        network_mode: "host"
        build:
            context: .
            dockerfile: Dockerfile.dev
        environment:
            DATABASE_URL: ecto://postgres:postgres@db/masaryk_dev
            MIX_ENV: dev
            BOT_TOKEN: ${BOT_TOKEN}
            DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
            DISCORD_ENABLED: ${DISCORD_ENABLED:-true}
            PHX_HOST: localhost
            PHX_LIVE_RELOAD_ENABLED: "true"
        ports:
            - "4000:4000"
            - "4369:4369" # EPMD
            - "9001-9010:9001-9010" # Distribution ports
        volumes:
            - .:/app
            - /app/_build
            - /app/deps
            - /app/apps/masaryk_ex/priv/static
            - /app/apps/masaryk_ex_web/priv/static
        depends_on:
            db:
                condition: service_healthy
        command: >
            sh -c "
              mix deps.get &&
              mix ecto.create &&
              mix ecto.migrate &&
              iex --name masaryk@app --cookie development_cookie -S mix phx.server # remote attach with `docker-compose exec app iex --sname masaryk2 --cookie development_cookie --remsh masaryk@app`
            "
        stdin_open: true
        tty: true

volumes:
    postgres_data:
